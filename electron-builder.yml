appId: com.dadpops.shortpath
productName: ShortPath
copyright: Copyright © 2024 Dadpops

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - node_modules/**/*
  - icons/**/*
  - package.json

# User data lives in app.getPath("userData") — outside the app bundle — so
# reinstalling never affects saved entries or settings.

win:
  target:
    - target: nsis
      arch: [x64]
  icon: icons/icon.ico
  # Signing — uncomment when a certificate is available. See docs/SIGNING.md.
  # certificateFile: path/to/cert.pfx
  # certificatePassword: ${env.WIN_CERT_PASSWORD}
  # signAndEditExecutable: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: icons/icon.icns
  category: public.app-category.productivity
  # Signing — uncomment when an Apple Developer ID is available. See docs/SIGNING.md.
  # identity: "Developer ID Application: Your Name (TEAMID)"
  # hardenedRuntime: true
  # entitlementsInherit: build/entitlements.mac.plist
  # gatekeeperAssess: false

linux:
  target:
    - target: AppImage
  icon: icons/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

# Tray app — keep it running in background
extraMetadata:
  main: dist/main/index.js
